name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        # Catches Next.js compile errors that tsc alone misses (route imports,
        # static analysis, edge runtime). Empty env so build doesn't depend on
        # real secrets — Vercel does the real prod build separately.
        env:
          NEXT_PUBLIC_API_URL: https://api.tn.hovioo.com/api/v1
        run: npm run build
